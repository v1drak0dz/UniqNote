name: uniqnote
description: "A simple note-taking app that born to be minimalist with cool features."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  path_provider: ^2.1.5
  flutter_staggered_grid_view: ^0.7.0
  flutter_quill: ^11.5.0
  quill_native_bridge: ^11.1.0
  url_launcher: ^6.3.2
  flutter_keyboard_visibility_temp_fork: ^0.1.5
  sqflite: ^2.4.2
  path: ^1.9.1
  flutter_speed_dial: ^7.0.0
  image_picker: ^1.2.1
  just_audio: ^0.10.5
  record: ^6.2.0
  file_picker: ^10.3.10
  open_filex: ^4.7.0
  sqflite_migration_service: ^2.0.0-nullsafety.1
  get_it: ^7.7.0
  easy_localization: ^3.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/sql/
    - assets/translations/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  android_application_name: "UniqNote"
  ios_application_name: "UniqNote"
