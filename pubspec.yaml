name: uniqnote
description: "A simple note-taking app that born to be minimalist with cool features."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  path_provider: ^2.1.5
  flutter_staggered_grid_view: ^0.7.0
  flutter_quill: ^11.5.0
  quill_native_bridge: ^11.1.0
  url_launcher: ^6.3.2
  flutter_keyboard_visibility_temp_fork: ^0.1.5
  sqflite: ^2.4.2
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  android_application_name: "UniqNote"
  ios_application_name: "UniqNote"
